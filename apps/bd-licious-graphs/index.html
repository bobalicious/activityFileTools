# bd-licious graphs

Load a FIT file and chart it — pace, cadence, stride length, heart rate, ground
contact time and vertical oscillation for runs; per-length pace, time, strokes
and SWOLF for pool swims.

## How to use it

1. **Open a file** — drop a `.fit` file on the panel, or click to choose one.
   The file is read entirely in this page and never uploaded.
2. **Choose what to graph** — pick a metric and a graph type. Add more metric
   rows to overlay several at once; each row can have its own colour, or stay
   **Linked** to the shared colour for that metric.
3. **Your graph** — adjust the y-axis start with the vertical slider, then
   **Download PNG** to save the image.

## Run dynamics

**Ground contact** and **vertical oscillation** come straight from the watch,
and only appear if yours records them — a footpod or a chest strap that measures
running dynamics. Both vary over a fairly narrow band, so the y-axis slider
beside the chart is worth reaching for: drag it up to cut off the empty space
below the data and stretch out the variation.

**Stride** uses the step length your watch recorded where there is one, and
otherwise derives it from speed and cadence.

## Graph types

- **Line** — one point per lap, joined.
- **Bar** — one bar per lap, with optional value labels.
- **Range** — a bar from each lap's minimum to its maximum.
- **Trace** — the underlying per-second samples rather than lap averages,
  smoothed by the amount you choose.

## Rest detection

Laps that look like recovery are detected automatically and can be shaded on
the chart. The **Rest sensitivity** slider moves the threshold. Moving it
re-classifies every lap, which discards any rest flags you set by hand.

## Saved configurations

Give a set of metric rows a name and **Save config** to keep it, then click its
chip to load it again.

## Graph theme

**Graph theme** controls the colours of the chart itself and of the exported
PNG — light or dark. It is independent of the page, which follows your
operating system's appearance setting.

## Saving your work

Saved configurations and your heart-rate zone boundaries are kept in this
browser, on this computer. The loaded file, the graph theme and the rest
sensitivity are not — they reset when you reload.

To back them up, or to move them to another browser or computer, open
**Settings** from the bar at the top of the page. **Export settings** writes a
single file covering every tool in the suite; **Import settings** reads one
back. An import replaces whatever that file contains, so export first if you
want a copy of what is here now.
    
## Your files, and no warranty

The file you open is only ever read — nothing is written back to it, and the
only thing this tool produces is a PNG of the chart. Your activity file is not
at risk here, but **keep your own copy of anything you care about** regardless.

This tool is provided **as-is, with no warranty of any kind**. You are
responsible for your own data: no liability is accepted for corrupted files,
lost activities, or any other loss arising from its use.
